<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Escolha um ou mais objetivos de saúde para iniciar sua jornada CareQuest.">
    <meta name="theme-color" content="#1C9770">
    <title>CareQuest – Objetivos</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Lineicons + Font Awesome (kit) -->
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/objective.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="app-shell">
        <main id="main-content" class="objective">

            <header class="objective__intro">
                <h1>O que você quer cuidar primeiro?</h1>
                <p>Escolha pelo menos um objetivo para começarmos.</p>
            </header>

            <form action="./terms.html" method="get" novalidate>
                <fieldset class="objective__list" aria-describedby="objective-help">
                    <legend class="visually-hidden">Objetivos de saúde disponíveis</legend>

                    <label class="objective__option" for="goal-sleep">
                        <span class="objective__option-content">
                            <span class="objective__icon objective__icon--moon" aria-hidden="true">
                                <i class="fa-regular fa-moon"></i>
                            </span>
                            <h2>Dormir melhor</h2>
                        </span>
                        <input type="checkbox" id="goal-sleep" name="goals" value="sleep">
                    </label>

                    <label class="objective__option" for="goal-move">
                        <span class="objective__option-content">
                            <span class="objective__icon objective__icon--body" aria-hidden="true">
                                <i class="lni lni-beat"></i>
                            </span>
                            <h2>Mexer mais o corpo</h2>
                        </span>
                        <input type="checkbox" id="goal-move" name="goals" value="move">
                    </label>

                    <label class="objective__option" for="goal-mind">
                        <span class="objective__option-content">
                            <span class="objective__icon objective__icon--brain" aria-hidden="true">
                                <i class="fa-solid fa-brain"></i>
                            </span>
                            <h2>Cuidar da mente</h2>
                        </span>
                        <input type="checkbox" id="goal-mind" name="goals" value="mind">
                    </label>

                    <label class="objective__option" for="goal-food">
                        <span class="objective__option-content">
                            <span class="objective__icon objective__icon--food" aria-hidden="true">
                                <i class="fa-solid fa-utensils"></i>
                            </span>
                            <h2>Me alimentar melhor</h2>
                        </span>
                        <input type="checkbox" id="goal-food" name="goals" value="food">
                    </label>
                </fieldset>

                <p id="objective-help" class="visually-hidden">Pode escolher mais de uma opção.</p>

                <nav class="objective__cta" aria-label="Ação principal">
                    <a class="btn-primary-cta" href="./terms.html">Continuar</a>
                </nav>
            </form>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>
</html>
