<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Não foi possível concluir o resgate da recompensa – CareQuest.">
    <meta name="theme-color" content="#1C9770">
    <title>CareQuest – Erro no Resgate</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/state-page.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="app-shell">

        <header class="page-header" style="padding: 1.25rem;">
            <a href="./catalog.html" class="page-header__back" aria-label="Voltar para o catálogo">
                <i class="lni lni-chevron-left" aria-hidden="true"></i>
            </a>
            <h1 class="page-header__title">Resgate</h1>
        </header>

        <main id="main-content" class="state-page">

            <div class="state-page__illustration state-page__illustration--error" aria-hidden="true">
                <i class="fa-solid fa-circle-exclamation"></i>
            </div>

            <h2 class="state-page__title">Não foi possível resgatar</h2>
            <p class="state-page__desc">
                Tivemos um problema ao processar seu resgate. Seus pontos não foram debitados — você pode tentar novamente mais tarde.
            </p>

            <div class="state-banner state-banner--error" role="alert" style="max-width: 320px;">
                <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
                <span>Erro temporário no servidor de parceiros. Código: PRC-409</span>
            </div>

            <div class="state-page__actions">
                <a class="btn-primary-cta" href="./catalog.html#popup">Tentar novamente</a>
                <a class="btn-primary-cta--secondary" href="./catalog.html">Voltar ao catálogo</a>
            </div>
        </main>

        <nav class="bottom-nav" aria-label="Navegação principal">
            <a href="./missions.html" class="bottom-nav__item">
                <i class="lni lni-home-2" aria-hidden="true"></i>
                <span>Início</span>
            </a>
            <a href="./wallet.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page">
                <i class="lni lni-wallet-1" aria-hidden="true"></i>
                <span>Carteira</span>
            </a>
            <a href="./profile.html" class="bottom-nav__item">
                <i class="lni lni-user-4" aria-hidden="true"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>
</html>
