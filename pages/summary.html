<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resumo do onboarding do CareQuest – pronto para começar.">
    <meta name="theme-color" content="#1C9770">
    <title>CareQuest – Pronto para começar!</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/summary.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="app-shell">
        <main id="main-content" class="summary">

            <div class="summary__check" aria-hidden="true">
                <i class="lni lni-check-circle-1"></i>
            </div>

            <section class="summary__main">
                <h1>Pronto para começar!</h1>

                <dl class="summary__list">
                    <div class="summary__item">
                        <dt>OBJETIVOS</dt>
                        <dd>Dormir melhor, Mexer o corpo</dd>
                    </div>
                    <div class="summary__item">
                        <dt>TRILHAS</dt>
                        <dd>Sono em Dia, Movimento na Rotina</dd>
                    </div>
                    <div class="summary__item">
                        <dt>STATUS</dt>
                        <dd class="summary__connected">
                            <i class="lni lni-checkmark-circle" aria-hidden="true"></i>
                            Saúde conectada
                        </dd>
                    </div>
                </dl>
            </section>

            <nav class="d-flex justify-content-center w-100" aria-label="Ação principal">
                <a class="btn-primary-cta" href="./missions.html">Ir para minhas missões</a>
            </nav>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
