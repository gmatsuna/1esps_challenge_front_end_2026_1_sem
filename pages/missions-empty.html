<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Você está em dia com suas missões – CareQuest.">
    <meta name="theme-color" content="#1C9770">
    <title>CareQuest – Você está em dia</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/missions.css">
    <link rel="stylesheet" href="../assets/css/state-page.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="app-shell">

        <header class="missions__header" role="banner">
            <div class="missions__header-top">
                <div class="missions__header-identity">
                    <div class="missions__avatar">
                        <img src="../assets/images/mascote.png" alt="Avatar do usuário Alex.">
                    </div>
                    <div class="missions__greeting">
                        <p>Olá, Alex</p>
                        <h1>Você está em dia!</h1>
                    </div>
                </div>
                <span class="missions__streak" aria-label="Sequência atual de 7 dias">
                    <i class="fa-solid fa-fire" aria-hidden="true"></i>
                    7 dias
                </span>
            </div>
        </header>

        <main id="main-content" class="state-page">
            <div class="state-page__illustration" aria-hidden="true">
                <i class="fa-regular fa-circle-check"></i>
            </div>

            <h2 class="state-page__title">Tudo certo por aqui!</h2>
            <p class="state-page__desc">
                Você concluiu todas as missões de hoje. Volte amanhã para novas atividades — ou explore sua carteira de pontos.
            </p>

            <div class="state-page__actions">
                <a class="btn-primary-cta" href="./wallet.html">Ver minha carteira</a>
                <a class="btn-primary-cta--secondary" href="./trail.html">Ajustar trilhas</a>
            </div>
        </main>

        <nav class="bottom-nav" aria-label="Navegação principal">
            <a href="./missions.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page">
                <i class="lni lni-home-2" aria-hidden="true"></i>
                <span>Início</span>
            </a>
            <a href="./wallet.html" class="bottom-nav__item">
                <i class="lni lni-wallet-1" aria-hidden="true"></i>
                <span>Carteira</span>
            </a>
            <a href="./profile.html" class="bottom-nav__item">
                <i class="lni lni-user-4" aria-hidden="true"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>
</html>
