<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Missão concluída! Você está no caminho certo no CareQuest.">
    <meta name="theme-color" content="#1C9770">
    <title>CareQuest – Missão Concluída</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <link rel="stylesheet" href="../assets/css/accomplished.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="app-shell">
        <main id="main-content" class="accomplished">

            <header class="accomplished__mascot">
                <img src="../assets/images/mascote.png" alt="Mascote do CareQuest comemorando.">
            </header>

            <section class="accomplished__main">
                <div class="accomplished__title">
                    <h1>Missão Concluída!</h1>
                    <p>Você está no caminho certo.</p>
                </div>

                <ul class="accomplished__report" aria-label="Resumo das recompensas obtidas">
                    <li class="accomplished__report-row">
                        <i class="fa-solid fa-star icon-xp" aria-hidden="true"></i>
                        <div>
                            <h2>+20 XP</h2>
                            <p>na trilha Movimento na Rotina</p>
                        </div>
                    </li>
                    <li class="accomplished__report-row">
                        <i class="fa-solid fa-coins icon-points" aria-hidden="true"></i>
                        <div>
                            <h2>+15 Pontos</h2>
                            <p>na sua carteira CareQuest</p>
                        </div>
                    </li>
                    <li class="accomplished__report-row">
                        <i class="fa-solid fa-fire-flame-curved icon-streak" aria-hidden="true"></i>
                        <div>
                            <h2>8 Dias se cuidando</h2>
                            <p>Streak atualizado!</p>
                        </div>
                    </li>
                </ul>
            </section>

            <nav class="accomplished__actions" aria-label="Próxima ação">
                <a class="btn-primary-cta btn-primary-cta--inverse" href="./missions.html">Voltar para o início</a>
                <a class="link-light" href="./wallet.html">Ver minha carteira</a>
            </nav>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>
</html>
