<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Falha na conexão com a plataforma de saúde – CareQuest.">
    <meta name="theme-color" content="#1C9770">
    <title>CareQuest – Erro na Conexão</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <link rel="stylesheet" href="../assets/css/connect.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="app-shell">
        <main id="main-content" class="connect">

            <div class="connect__icon-wrap" aria-hidden="true">
                <i class="fa-solid fa-heart-crack"></i>
            </div>

            <header class="connect__text">
                <h1>Não conseguimos conectar</h1>
                <p>Falha na conexão com a plataforma de saúde. Você pode tentar novamente ou seguir sem conectar.</p>
            </header>

            <div class="connect__error-banner state-banner state-banner--error" role="alert">
                <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
                <span>Erro: tempo de resposta excedido. Verifique sua conexão e tente novamente em alguns instantes.</span>
            </div>

            <nav class="connect__actions" aria-label="Ações de recuperação">
                <a class="btn-primary-cta" href="./connect.html">Tentar novamente</a>
                <a class="btn-primary-cta--secondary" href="./trail.html">Seguir sem conectar</a>
            </nav>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>
</html>
