<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conecte o CareQuest a Apple Health ou Google Fit para rastrear passos e sono.">
    <meta name="theme-color" content="#1C9770">
    <title>CareQuest – Conectar Saúde</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <link rel="stylesheet" href="../assets/css/connect.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="app-shell">
        <main id="main-content" class="connect">

            <div class="connect__icon-wrap" aria-hidden="true">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>

            <header class="connect__text">
                <h1>Conectar Saúde</h1>
                <p>Conecte-se ao Apple Health ou Google Fit para registrar seus passos e sono automaticamente.</p>
            </header>

            <nav class="connect__actions" aria-label="Ações de conexão">
                <a class="btn-primary-cta" href="./trail.html">Conectar agora</a>
                <a class="btn-primary-cta--secondary" href="./trail.html">Pular por enquanto</a>
                <p class="text-muted text-center" style="font-size: 0.75rem; max-width: 280px;">
                    Você pode conectar mais tarde nas configurações.
                </p>
                <p style="font-size: 0.75rem;">
                    <a href="./connect-error.html">Simular falha de conexão</a>
                </p>
            </nav>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>
</html>
