<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Configure suas notificações no CareQuest – lembretes moderados e empáticos.">
    <meta name="theme-color" content="#1C9770">
    <title>CareQuest – Notificações</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/notifications.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <div class="app-shell">

        <header class="page-header" style="padding: 1.5rem 1.25rem 0;">
            <a href="./profile.html" class="page-header__back" aria-label="Voltar para o perfil">
                <i class="lni lni-chevron-left" aria-hidden="true"></i>
            </a>
            <h1 class="page-header__title">Notificações</h1>
        </header>

        <main id="main-content" class="notifications">

            <p class="notifications__intro">
                Lembretes moderados e empáticos. Você ajusta o ritmo — nunca enviamos pressão punitiva.
            </p>

            <form action="#" method="post" novalidate>
                <section class="notifications__group" aria-labelledby="grp-diarios">
                    <h2 id="grp-diarios" class="notifications__group-title">Lembretes diários</h2>

                    <label class="notifications__row" for="notif-missions">
                        <span class="notifications__row-text">
                            <h3>Missões do dia</h3>
                            <p>Receber às 9h um lembrete sobre as missões disponíveis.</p>
                        </span>
                        <span class="toggle">
                            <input type="checkbox" id="notif-missions" checked>
                            <span class="toggle__slider" aria-hidden="true"></span>
                        </span>
                    </label>

                    <label class="notifications__row" for="notif-water">
                        <span class="notifications__row-text">
                            <h3>Hidratação</h3>
                            <p>Lembrete a cada 3 horas para beber água.</p>
                        </span>
                        <span class="toggle">
                            <input type="checkbox" id="notif-water">
                            <span class="toggle__slider" aria-hidden="true"></span>
                        </span>
                    </label>

                    <label class="notifications__row" for="notif-mindful">
                        <span class="notifications__row-text">
                            <h3>Pausa para a mente</h3>
                            <p>Convite para uma respiração de 1 minuto à tarde.</p>
                        </span>
                        <span class="toggle">
                            <input type="checkbox" id="notif-mindful" checked>
                            <span class="toggle__slider" aria-hidden="true"></span>
                        </span>
                    </label>
                </section>

                <section class="notifications__group" aria-labelledby="grp-semanal">
                    <h2 id="grp-semanal" class="notifications__group-title">Resumo semanal</h2>

                    <label class="notifications__row" for="notif-summary">
                        <span class="notifications__row-text">
                            <h3>Receber relatório</h3>
                            <p>Um resumo dos seus avanços toda segunda-feira.</p>
                        </span>
                        <span class="toggle">
                            <input type="checkbox" id="notif-summary" checked>
                            <span class="toggle__slider" aria-hidden="true"></span>
                        </span>
                    </label>

                    <label class="notifications__row" for="notif-channel">
                        <span class="notifications__row-text">
                            <h3>Canal preferido</h3>
                            <p>Onde devemos te avisar?</p>
                        </span>
                        <select id="notif-channel" class="notifications__select" aria-label="Canal preferido">
                            <option value="push" selected>Push</option>
                            <option value="email">E-mail</option>
                            <option value="both">Ambos</option>
                        </select>
                    </label>
                </section>

                <section class="notifications__group" aria-labelledby="grp-silencio">
                    <h2 id="grp-silencio" class="notifications__group-title">Modo silencioso</h2>

                    <label class="notifications__row" for="notif-quiet">
                        <span class="notifications__row-text">
                            <h3>Não perturbar</h3>
                            <p>Pausa nas notificações entre 22h e 7h.</p>
                        </span>
                        <span class="toggle">
                            <input type="checkbox" id="notif-quiet" checked>
                            <span class="toggle__slider" aria-hidden="true"></span>
                        </span>
                    </label>
                </section>

                <div class="notifications__cta">
                    <a class="btn-primary-cta" href="./profile.html">Salvar preferências</a>
                </div>
            </form>
        </main>

        <nav class="bottom-nav" aria-label="Navegação principal">
            <a href="./missions.html" class="bottom-nav__item">
                <i class="lni lni-home-2" aria-hidden="true"></i>
                <span>Início</span>
            </a>
            <a href="./wallet.html" class="bottom-nav__item">
                <i class="lni lni-wallet-1" aria-hidden="true"></i>
                <span>Carteira</span>
            </a>
            <a href="./profile.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page">
                <i class="lni lni-user-4" aria-hidden="true"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>
</html>
